<!DOCTYPE html>
<html>

<head>
    <title>Hangman Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        #word-display {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            letter-spacing: 10px;
            min-height: 80px;
        }

        #guessed-letters {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2em;
        }

        #lives {
            font-size: 2em;
            color: #e74c3c;
            margin: 20px 0;
        }

        #hangman {
            font-size: 4em;
            margin: 20px 0;
            line-height: 1;
        }

        input {
            font-size: 1.5em;
            padding: 15px 20px;
            border: 3px solid #667eea;
            border-radius: 10px;
            width: 80px;
            text-align: center;
            text-transform: uppercase;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .win {
            background: #48bb78 !important;
            color: white !important;
        }

        .lose {
            background: #e53e3e !important;
            color: white !important;
        }

        .message {
            font-size: 1.5em;
            margin: 20px 0;
            min-height: 50px;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <h1>🎮 Hangman</h1>

        <div id="hangman">🏃</div>

        <div id="word-display">_ _ _ _ _</div>

        <div id="lives">❤️❤️❤️❤️❤️ (5 lives)</div>

        <div id="guessed-letters">Guessed: None</div>

        <div class="message" id="message"></div>

        <input type="text" id="guess-input" maxlength="1" placeholder="A-Z">
        <br>
        <button onclick="guessLetter()">Guess!</button>
        <button onclick="newGame()">New Game</button>
    </div>


</body>

</html>
